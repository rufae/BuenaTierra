name: CI — Build · Test · Docker

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  DOTNET_VERSION: '9.0.x'
  NODE_VERSION: '20.x'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/buenatierra-api

jobs:
  # ─────────────────────────────────────────────────────────
  # JOB 1: Build + Unit tests + Integration tests (backend)
  # ─────────────────────────────────────────────────────────
  backend:
    name: .NET Build & Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: buenatierra
          POSTGRES_PASSWORD: buenatierra_test
          POSTGRES_DB: buenatierra_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore BuenaTierra.sln

      - name: Build (Release)
        run: dotnet build BuenaTierra.sln --no-restore -c Release

      - name: Run unit tests
        run: |
          dotnet test tests/BuenaTierra.Tests/BuenaTierra.Tests.csproj \
            --no-build -c Release \
            --logger "trx;LogFileName=unit-results.xml" \
            --collect:"XPlat Code Coverage"

      - name: Run integration tests
        if: ${{ hashFiles('tests/BuenaTierra.IntegrationTests/*.csproj') != '' }}
        env:
          ConnectionStrings__DefaultConnection: "Host=localhost;Port=5432;Database=buenatierra_test;Username=buenatierra;Password=buenatierra_test"
          Jwt__Secret: "ci-test-secret-at-least-32-chars-long!!"
          Jwt__Issuer: "BuenaTierra"
          Jwt__Audience: "BuenaTierraClients"
        run: |
          dotnet test tests/BuenaTierra.IntegrationTests/BuenaTierra.IntegrationTests.csproj \
            --no-build -c Release \
            --logger "trx;LogFileName=integration-results.xml"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            **/*-results.xml
            **/coverage.cobertura.xml

      - name: Code coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: '**/coverage.cobertura.xml'
          fail_ci_if_error: false

  # ─────────────────────────────────────────────────────────
  # JOB 2: Frontend build
  # ─────────────────────────────────────────────────────────
  frontend:
    name: Vite Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: TypeScript check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ─────────────────────────────────────────────────────────
  # JOB 3: Docker build + push (solo en main)
  # ─────────────────────────────────────────────────────────
  docker:
    name: Docker push
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
