services:
  db:
    image: postgres:15.4-alpine
    container_name: buenatierra_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-buenatierra}
      POSTGRES_USER: ${POSTGRES_USER:-buenatierra_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data/pgdata
      - ./database/init:/docker-entrypoint-initdb.d:ro
      - ./database/backups:/backups
      - ./database/backup.sh:/backups/backup.sh:ro
    ports:
      - "5434:5432"
    networks:
      - buenatierra_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-buenatierra_admin} -d ${POSTGRES_DB:-buenatierra}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  api:
    image: buenatierra/api:latest
    build:
      context: .
      dockerfile: src/BuenaTierra.API/Dockerfile
    container_name: buenatierra_api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=${POSTGRES_DB:-buenatierra};Username=${POSTGRES_USER:-buenatierra_admin};Password=${POSTGRES_PASSWORD};Pooling=true;Minimum Pool Size=5;Maximum Pool Size=50;"
      Jwt__Secret: ${JWT_SECRET}
      Jwt__Issuer: BuenaTierra
      Jwt__Audience: BuenaTierraClients
      Jwt__ExpiresInMinutes: 480
      Jwt__RefreshExpiresInDays: 30
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - buenatierra_net
    volumes:
      - api_logs:/app/logs
      - api_reports:/app/reports
      - api_uploads:/app/uploads

  nginx:
    image: nginx:alpine
    container_name: buenatierra_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - frontend_dist:/usr/share/nginx/html:ro
    depends_on:
      - api
      - frontend_build
    networks:
      - buenatierra_net

  frontend_build:
    image: node:20-alpine
    container_name: buenatierra_frontend_build
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_dist:/app/dist
    command: sh -c "npm ci && npm run build"
    environment:
      VITE_API_URL: /api

  collabora:
    image: collabora/code:latest
    container_name: buenatierra_collabora
    restart: unless-stopped
    environment:
      # Allow connections from our dev/prod hosts
      aliasgroup1: "http://localhost:5001,http://host.docker.internal:5001,http://buenatierra_api:8080"
      # CRITICAL: Use extra_params with --o: prefix to override coolwsd.xml settings.
      # Plain env vars like "ssl.enable=false" are IGNORED by Collabora.
      extra_params: >-
        --o:ssl.enable=false
        --o:ssl.termination=false
        --o:logging.level=warning
        --o:net.frame_ancestors=localhost:5173
        --o:languagetool.enabled=false
      # Language
      dictionaries: "es_ES"
    ports:
      - "127.0.0.1:9980:9980"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    cap_add:
      - MKNOD
    networks:
      - buenatierra_net

volumes:
  postgres_data:
    driver: local
  api_logs:
    driver: local
  api_reports:
    driver: local
  api_uploads:
    driver: local
  frontend_dist:
    driver: local

networks:
  buenatierra_net:
    driver: bridge
